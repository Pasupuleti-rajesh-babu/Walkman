<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C2C Data Engineer Jobs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #4f6ef7;
      --accent-hover: #6b85ff;
      --text: #e4e6f1;
      --text-muted: #8b90b0;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,.35);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 42px; height: 42px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -.3px; }
    header p { font-size: .8rem; color: var(--text-muted); margin-top: 2px; }
    .last-updated { font-size: .75rem; color: var(--text-muted); text-align: right; }

    /* ── Main ── */
    main { max-width: 1300px; margin: 0 auto; padding: 28px 20px; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 22px;
      flex: 1; min-width: 140px;
    }
    .stat-card .label { font-size: .72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .value { font-size: 1.6rem; font-weight: 700; margin-top: 4px; }
    .stat-card .value.blue { color: var(--accent); }
    .stat-card .value.green { color: var(--green); }
    .stat-card .value.yellow { color: var(--yellow); }

    /* ── Filters ── */
    .filters {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex; gap: 12px; flex-wrap: wrap;
      align-items: center;
      margin-bottom: 24px;
    }
    .search-wrap { position: relative; flex: 1; min-width: 220px; }
    .search-wrap svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--text-muted); pointer-events: none;
    }
    input[type="text"], select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .875rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"] { padding-left: 36px; width: 100%; }
    input[type="text"]:focus, select:focus { border-color: var(--accent); }
    select { min-width: 160px; cursor: pointer; }
    select option { background: var(--surface2); }

    .btn-clear {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: .8rem;
      padding: 9px 16px;
      transition: all .2s;
      white-space: nowrap;
    }
    .btn-clear:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Results info ── */
    .results-info {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
    }
    .results-info span { font-size: .875rem; color: var(--text-muted); }
    .results-info strong { color: var(--text); }

    /* ── Job Grid ── */
    #job-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex; flex-direction: column;
      gap: 12px;
      transition: border-color .2s, transform .15s, box-shadow .2s;
    }
    .job-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .job-title {
      font-size: .975rem; font-weight: 600; line-height: 1.4;
      color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .badge-new {
      background: #1e3a2f; color: var(--green);
      border: 1px solid #2d5a45;
      border-radius: 6px; font-size: .68rem; font-weight: 600;
      padding: 3px 8px; white-space: nowrap; flex-shrink: 0;
    }

    .card-meta { display: flex; flex-wrap: wrap; gap: 8px; }
    .meta-pill {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .75rem; color: var(--text-muted);
      padding: 4px 10px;
    }
    .meta-pill svg { width: 12px; height: 12px; flex-shrink: 0; }
    .meta-pill.source { color: var(--accent); border-color: #2a3670; background: #131830; }

    .btn-view {
      display: block; text-align: center; text-decoration: none;
      background: linear-gradient(135deg, var(--accent), #6b5bf7);
      border-radius: 8px;
      color: #fff; font-size: .825rem; font-weight: 600;
      padding: 9px;
      transition: opacity .2s, transform .1s;
      margin-top: auto;
    }
    .btn-view:hover { opacity: .88; transform: translateY(-1px); }

    /* ── Empty state ── */
    #empty-state {
      display: none; text-align: center; padding: 80px 20px;
      grid-column: 1 / -1;
    }
    #empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: .4; }
    #empty-state h3 { color: var(--text-muted); font-size: 1.1rem; }
    #empty-state p { color: var(--text-muted); font-size: .85rem; margin-top: 6px; }

    /* ── Loading ── */
    #loading {
      text-align: center; padding: 80px 20px;
      grid-column: 1 / -1; color: var(--text-muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      text-align: center; padding: 32px 20px;
      color: var(--text-muted); font-size: .78rem;
      border-top: 1px solid var(--border); margin-top: 48px;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 16px; }
      header h1 { font-size: 1.1rem; }
      main { padding: 16px 12px; }
      #job-grid { grid-template-columns: 1fr; }
      .stat-card { min-width: 110px; padding: 12px 14px; }
      .stat-card .value { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <h1>C2C Data Engineer Jobs</h1>
      <p>Corp-to-Corp · USA · Auto-updated daily</p>
    </div>
  </div>
  <div class="last-updated">
    Last updated: <span id="last-updated-time">—</span>
  </div>
</header>

<main>
  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="label">Total Jobs</div>
      <div class="value blue" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Today</div>
      <div class="value green" id="stat-today">—</div>
    </div>
    <div class="stat-card">
      <div class="label">This Week</div>
      <div class="value yellow" id="stat-week">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Sources</div>
      <div class="value" id="stat-sources">—</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="search-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search by keyword: Snowflake, PySpark, AWS…" />
    </div>

    <select id="source-filter">
      <option value="">All Sources</option>
    </select>

    <select id="date-filter">
      <option value="">All Dates</option>
      <option value="1">Today</option>
      <option value="7">Last 7 Days</option>
      <option value="30">Last 30 Days</option>
    </select>

    <button class="btn-clear" id="btn-clear">Clear Filters</button>
  </div>

  <!-- Results count -->
  <div class="results-info">
    <span>Showing <strong id="showing-count">0</strong> jobs</span>
  </div>

  <!-- Grid -->
  <div id="job-grid">
    <div id="loading">
      <div class="spinner"></div>
      <p>Loading jobs…</p>
    </div>
  </div>
</main>

<footer>
  Data refreshed automatically every day at 8 AM UTC via GitHub Actions &nbsp;·&nbsp;
  Sources: CorpToCorp, US Staffing Inc, nVoids, BigHotList
</footer>

<script>
  let allJobs = [];

  const grid = document.getElementById('job-grid');
  const searchInput = document.getElementById('search-input');
  const sourceFilter = document.getElementById('source-filter');
  const dateFilter = document.getElementById('date-filter');
  const showingCount = document.getElementById('showing-count');

  function daysAgo(dateStr) {
    if (!dateStr) return Infinity;
    const d = new Date(dateStr);
    if (isNaN(d)) return Infinity;
    return Math.floor((Date.now() - d.getTime()) / 86400000);
  }

  function formatDate(dateStr) {
    if (!dateStr) return 'Unknown date';
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    const ago = daysAgo(dateStr);
    if (ago === 0) return 'Today';
    if (ago === 1) return 'Yesterday';
    if (ago < 7) return `${ago} days ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function isNew(dateStr) {
    return daysAgo(dateStr) <= 2;
  }

  function renderJobs(jobs) {
    showingCount.textContent = jobs.length;

    const existing = grid.querySelectorAll('.job-card, #empty-state');
    existing.forEach(el => el.remove());

    if (jobs.length === 0) {
      const empty = document.createElement('div');
      empty.id = 'empty-state';
      empty.style.display = 'block';
      empty.innerHTML = `
        <div class="icon">🔍</div>
        <h3>No jobs found</h3>
        <p>Try adjusting your filters or search terms.</p>
      `;
      grid.appendChild(empty);
      return;
    }

    const frag = document.createDocumentFragment();
    jobs.forEach(job => {
      const card = document.createElement('div');
      card.className = 'job-card';
      card.innerHTML = `
        <div class="card-header">
          <div class="job-title">${escHtml(job.title || 'Untitled Job')}</div>
          ${isNew(job.date) ? '<span class="badge-new">NEW</span>' : ''}
        </div>
        <div class="card-meta">
          <span class="meta-pill source">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            ${escHtml(job.source || 'Unknown')}
          </span>
          <span class="meta-pill">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
            </svg>
            ${escHtml(formatDate(job.date))}
          </span>
        </div>
        <a class="btn-view" href="${escHtml(job.link || '#')}" target="_blank" rel="noopener noreferrer">
          View Job →
        </a>
      `;
      frag.appendChild(card);
    });
    grid.appendChild(frag);
  }

  function applyFilters() {
    const kw = searchInput.value.trim().toLowerCase();
    const src = sourceFilter.value;
    const days = parseInt(dateFilter.value) || 0;

    const filtered = allJobs.filter(job => {
      if (kw && !((job.title || '').toLowerCase().includes(kw))) return false;
      if (src && job.source !== src) return false;
      if (days && daysAgo(job.date) > days) return false;
      return true;
    });

    renderJobs(filtered);
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function populateSourceFilter(jobs) {
    const sources = [...new Set(jobs.map(j => j.source).filter(Boolean))].sort();
    sources.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      sourceFilter.appendChild(opt);
    });
  }

  function updateStats(jobs) {
    document.getElementById('stat-total').textContent = jobs.length;
    document.getElementById('stat-today').textContent = jobs.filter(j => daysAgo(j.date) === 0).length;
    document.getElementById('stat-week').textContent = jobs.filter(j => daysAgo(j.date) <= 7).length;
    document.getElementById('stat-sources').textContent = new Set(jobs.map(j => j.source).filter(Boolean)).size;
  }

  async function loadJobs() {
    try {
      const RAW = 'https://raw.githubusercontent.com/pasupuleti-rajesh-babu/Walkman/main/data/jobs.json';
      const res = await fetch(RAW + '?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      allJobs = Array.isArray(data) ? data : (data.jobs || []);

      allJobs.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));

      document.getElementById('loading').remove();
      populateSourceFilter(allJobs);
      updateStats(allJobs);

      const ts = allJobs.find(j => j.scraped_at);
      document.getElementById('last-updated-time').textContent =
        ts ? new Date(ts.scraped_at).toLocaleString() : new Date().toLocaleDateString();

      renderJobs(allJobs);
    } catch (err) {
      document.getElementById('loading').innerHTML =
        `<p style="color:var(--text-muted)">⚠ Could not load jobs.json.<br><small>${err.message}</small></p>`;
    }
  }

  searchInput.addEventListener('input', applyFilters);
  sourceFilter.addEventListener('change', applyFilters);
  dateFilter.addEventListener('change', applyFilters);

  document.getElementById('btn-clear').addEventListener('click', () => {
    searchInput.value = '';
    sourceFilter.value = '';
    dateFilter.value = '';
    applyFilters();
  });

  loadJobs();
</script>
</body>
</html>
